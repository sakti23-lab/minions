version: '3.8'

services:
  minions:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: minions
    ports:
      - "6969:6969"
    environment:
      - NODE_ENV=production
      - PORT=6969
      - HOST=0.0.0.0
      - HERMES_URL=${HERMES_URL:-http://host.docker.internal:5000}
    volumes:
      - minions-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:6969', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  minions-data:
    driver: local
